<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>USTP Oroquieta Intramurals 2026 Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="schedule-page">
    <div class="landing-shell">
        <header class="site-header">
            <nav class="navbar navbar-expand-lg navbar-dark py-3">
                <div class="container">
                    <a class="navbar-brand d-flex align-items-center gap-3" href="index.html#home">
                        <img src="assets/USTPLOGO.png" alt="USTP Oroquieta logo" class="brand-mark">
                        <span class="brand-copy">
                            <span class="brand-title">USTP Oroquieta Intramurals</span>
                            <span class="brand-subtitle">2026 Leaderboard</span>
                        </span>
                    </a>

                    <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
                        <ul class="navbar-nav align-items-lg-center gap-lg-3 mb-3 mb-lg-0">
                            <li class="nav-item"><a class="nav-link" href="index.html#home">Home</a></li>
                            <li class="nav-item"><a class="nav-link" href="Teams.html">Teams</a></li>
                            <li class="nav-item"><a class="nav-link active" href="schedule.html">Schedule</a></li>
                            <li class="nav-item"><a class="nav-link" href="results.html">Results</a></li>
                            <li class="nav-item"><a class="nav-link" href="games.html">Games</a></li>
                        </ul>

                        <a href="#" class="profile-pill ms-lg-4" aria-label="Profile">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.31 0-6 2.02-6 4.5V20h12v-1.5c0-2.48-2.69-4.5-6-4.5Z" fill="currentColor"/>
                            </svg>
                        </a>
                    </div>
                </div>
            </nav>
        </header>

        <main>
            <section class="schedule-section">
                <div class="container">
                    <div class="schedule-hero">
                        <span class="schedule-icon">&#128197;</span>
                        <h1>Match Schedule</h1>
                        <p>November 24 - 28, 2025</p>
                    </div>

                    <div class="schedule-shell">
                        <div class="schedule-days" role="tablist" aria-label="Match days">
                            <button class="schedule-day active" type="button">Nov 24 &middot; Day 1</button>
                            <button class="schedule-day" type="button">Nov 25 &middot; Day 2</button>
                            <button class="schedule-day" type="button">Nov 26 &middot; Day 3</button>
                            <button class="schedule-day" type="button">Nov 27 &middot; Day 4</button>
                            <button class="schedule-day" type="button">Nov 28 &middot; Day 5</button>
                        </div>

                        <div class="schedule-empty-state">
                            <div class="schedule-empty-card">
                                <span class="schedule-empty-icon">&#128338;</span>
                                <h2>No events scheduled for this day.</h2>
                                <p>Select another day once the next batch of match schedules is published.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="site-footer custom-footer">
            <div class="container">
                <div class="footer-center">
                    <div class="footer-logos">
                        <img src="assets/logo.png" alt="Logo 1" class="footer-logo-circle">
                        <img src="assets/USTPLOGO.png" alt="Logo 2" class="footer-logo-circle">
                    </div>
                    <div class="footer-event-name">USTP Intramurals 2026</div>
                    <div class="footer-subtitle">Supreme Student Council</div>
                </div>
            </div>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
